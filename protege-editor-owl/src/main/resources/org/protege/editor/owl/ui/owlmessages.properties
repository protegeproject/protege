menu.edit.paste = Paste
menu.edit.paste.tooltip = Paste
menu.edit.duplicate = Duplicate selected class...
menu.edit.duplicate.tooltip = Duplicates the current class. This copies the class, its superclasses and equivalent classes.
menu.edit.delete = Delete...
menu.edit.delete.tooltip = Deletes the selection in the focused view
menu.edit.createnew = Create new
menu.edit.createnew.tooltip = Create a new object in the selected view
menu.edit.createchild = Create child
menu.edit.createchild.tooltip = Create a child of the selected object in the selected view
menu.edit.createsibling = Create sibling
menu.edit.createsibling.tooltip = Create a sibling of the selected object in the selected view
menu.edit.addsubclass = Add subclass...
menu.edit.addsubclass.tooltip = Add a subclass of the selected class
menu.edit.addsiblingclass = Add sibling class...
menu.edit.addsiblingclass.tooltip = Add a sibling of the selected class
menu.edit.addsubclasses = Add subclasses...
menu.edit.addsubclasses.tooltip = Adds a sub-hierarchy below the selected class created from tab indented text
menu.edit.converttoprimitive = Convert to primitive class
menu.edit.converttoprimitive.tooltip = Converts the equivalent classes of the selected class to superclasses.
menu.edit.converttodefined = Convert to defined class
menu.edit.converttodefined.tooltip = Converts the superclasses of the selected class to an equivalent class.
menu.edit.makeprimitivesiblingsdisjoint = Make primitive siblings disjoint
menu.edit.makeprimitivesiblingsdisjoint.tooltip = Makes primitive sibling classes disjoint. All disjoint axioms are added to the current ontology.
menu.edit.makeallindividualsdifferent = Make all individuals different
menu.edit.makeallindividualsdifferent.tooltip = Removes all DifferentIndividuals axioms and adds one DifferentIndividuals axiom containing all individuals in the signature of the active ontologies.
menu.edit.makeinstancesdifferent = Make instances different
menu.edit.makeinstancesdifferent.tooltip = Makes the individuals that are instances the selected class different individuals. This only changes the active ontology.
menu.edit.addcoveringaxiom = Add covering axiom
menu.edit.addcoveringaxiom.tooltip = Adds a covering axiom to the selected class. If a class A has subclassses B, C and D then the covering axiom for A is the union class (B or C or D). This forces all instances of A to be a member of one of its subclasses.
menu.edit.removelocaldisjoint = Remove local disjoint classes axioms...
menu.edit.removelocaldisjoint.tooltip = Removes all of the disjoint classes axioms that reference subclasses of the selected class.
menu.edit.removealldisjoint = Remove all disjoint classes axioms...
menu.edit.removealldisjoint.tooltip = Removes all of the disjoint classes axioms in the active ontologies
menu.edit.deprecate = Deprecate entity...
menu.edit.deprecate.tooltip = Deprecates the selected entity
menu.edit.deprecateclass = Deprecate...
menu.edit.deprecateclass.tooltip = Deprecates the selected class
menu.edit.mergeinto = Merge into entity...
menu.edit.mergeinto.tooltip = Merges the selected entity into another entity
menu.edit.mergeintoclass = Merge into...
menu.edit.mergeintoclass.tooltip = Merges the selected class into another class

# -----------------------------------------------------------------------------
# Menu Items - Refactor
# -----------------------------------------------------------------------------
menu.refactor = Refactor
menu.refactor.tooltip = Refactor the ontology, or the selected class, property or individual
menu.refactor.renameentity = Rename entity...
menu.refactor.renameentity.tooltip = Change the IRI of the selected entity
menu.refactor.renameentityiri = Change IRI (Rename)...
menu.refactor.renameentityiri.tooltip = Change the IRI of the selected class
menu.refactor.renamemultiple = Rename multiple entities...
menu.refactor.renamemultiple.tooltip = Change the IRI of entities using search and replace
menu.refactor.changeontologyiri = Change ontology IRI...
menu.refactor.changeontologyiri.tooltip = Change the IRI of the active ontology
menu.refactor.convertiristolabels = Convert entity IRIs to labels...
menu.refactor.convertiristolabels.tooltip = Change the IRI of all entities to an ID and move the name to a label annotation on the entity as per settings in the New Entity preferences
menu.refactor.convertpunstoannotations = Convert property assertion on class/individual puns to annotations
menu.refactor.convertpunstoannotations.tooltip = Converts any property assertions with a subject which is a pun to an annotation on the class which is punned
menu.refactor.coercedatapropertyvalues = Coerce data property values into property range
menu.refactor.coercedatapropertyvalues.tooltip = Coerces any data property value into (to be typed by) the range of the data property
menu.refactor.splitsubclassaxioms = Split subclass axioms
menu.refactor.splitsubclassaxioms.tooltip = Splits subclass axioms in the active ontologies into more fine grained axioms. For example, A subClassOf (B and C) would be split into A subClassOf B, and A subClassOf C
menu.refactor.amalgamatesubclassaxioms = Amalgamate subclass axioms
menu.refactor.amalgamatesubclassaxioms.tooltip = Merges subclass axioms that have a common left hand side. For example, A subClassOf B, A subClassOf C would be merged into a single subclass axiom, A subClassOf (B and C).
menu.refactor.splitdisjointclasses = Split disjoint classes into pairwise disjoints
menu.refactor.splitdisjointclasses.tooltip = Splits disjoint classes axioms in the active ontologies into pairwise disjoints to aid backwards compatibility. For example, disjointClasses(A, B, C) would be split into A disjointWith B, A disjointWith C, B disjointWith C
menu.refactor.amalgamatedisjoint = Amalgamate disjoint classes into larger disjoint sets
menu.refactor.amalgamatedisjoint.tooltip = Merges disjoint classes axioms in the active ontologies into more efficient sets. For example, A disjointWith B, A disjointWith C, B disjointWith C would be merged into disjointClasses(A, B, C)
menu.refactor.merg ontologies = Merge ontologies...
menu.refactor.mergentologies.tooltip = Merge one or more ontologies into an existing or new ontology.
menu.refactor.convertqualcard = Convert qualified min cardinality 1 to someValuesFrom
menu.refactor.convertqualcard.tooltip = Finds all uses of qualified min cardinality 1 restrictions and replaces them with someValuesFrom restrictions.
menu.refactor.copymoveaxioms = Copy/move/delete axioms ...
menu.refactor.copymoveaxioms.tooltip = Extract/select axioms from an ontology and optionally move them to another ontology

